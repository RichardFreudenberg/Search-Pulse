version: "3.9"

# ─── SearchPulse Pipeline — Docker Compose ────────────────────────────────────
# Services:
#   postgres   — pipeline's own PostgreSQL DB (separate from Firestore)
#   redis      — Celery broker + queue backend
#   api        — FastAPI REST API (port 8000)
#   worker     — Celery task worker
#   beat       — Celery beat scheduler (cron jobs)
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # background
#   docker compose logs -f worker      # watch worker logs
#   docker compose exec api bash       # shell into API container

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB:       pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn pipeline.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:              postgresql://pipeline:pipeline@postgres:5432/pipeline
      REDIS_URL:                 redis://redis:6379/0
      FIREBASE_CREDENTIALS_PATH: /app/config/serviceAccountKey.json
      FIREBASE_PROJECT_ID:       ${FIREBASE_PROJECT_ID:-}
      OPENAI_API_KEY:            ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL:                 INFO
    volumes:
      - .:/app
      - document_cache:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A pipeline.ingestion.tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=pipeline:high,pipeline:default,pipeline:bulk
    environment:
      DATABASE_URL:              postgresql://pipeline:pipeline@postgres:5432/pipeline
      REDIS_URL:                 redis://redis:6379/0
      FIREBASE_CREDENTIALS_PATH: /app/config/serviceAccountKey.json
      FIREBASE_PROJECT_ID:       ${FIREBASE_PROJECT_ID:-}
      OPENAI_API_KEY:            ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY:-}
    volumes:
      - .:/app
      - document_cache:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery beat scheduler ─────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A pipeline.ingestion.tasks.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL:  postgresql://pipeline:pipeline@postgres:5432/pipeline
      REDIS_URL:     redis://redis:6379/0
    volumes:
      - .:/app
      - beat_data:/app/data/beat
    depends_on:
      - redis
      - worker

volumes:
  postgres_data:
  redis_data:
  document_cache:
  beat_data:
